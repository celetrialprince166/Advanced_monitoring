# =============================================================================
# Jenkins Configuration as Code (JCasC)
# =============================================================================
# This file is mounted into the Jenkins controller at:
#   /var/jenkins_home/casc/jenkins.yaml
#
# All ${VAR} references are substituted from environment variables injected
# via Docker Compose env_file (.env). The .env is auto-generated by
# generate-jenkins-env.sh from terraform outputs.
#
# SonarCloud: Uses https://sonarcloud.io (NOT a local SonarQube server)
# =============================================================================

jenkins:
  systemMessage: |
    Jenkins is fully configured via JCasC (Jenkins Configuration as Code).
    All credentials and plugins are managed automatically.
    Do NOT modify credentials through the UI — update the .env file instead.

  securityRealm:
    local:
      allowsSignup: false
      users:
        - id: "${JENKINS_ADMIN_USER:-admin}"
          password: "${JENKINS_ADMIN_PASSWORD:-admin}"

  authorizationStrategy:
    loggedInUsersCanDoAnything:
      allowAnonymousRead: false

  numExecutors: 2

# =============================================================================
# Credentials — All 17 IDs from the Jenkinsfile header
# =============================================================================
credentials:
  system:
    domainCredentials:
      - credentials:
          # --- AWS ---
          - string:
              scope: GLOBAL
              id: "aws-access-key-id"
              description: "AWS Access Key ID"
              secret: "${JENKINS_AWS_ACCESS_KEY_ID}"
          - string:
              scope: GLOBAL
              id: "aws-secret-access-key"
              description: "AWS Secret Access Key"
              secret: "${JENKINS_AWS_SECRET_ACCESS_KEY}"
          - string:
              scope: GLOBAL
              id: "aws-region"
              description: "AWS Region (e.g. eu-west-1)"
              secret: "${JENKINS_AWS_REGION}"

          # --- ECR ---
          - string:
              scope: GLOBAL
              id: "ecr-registry"
              description: "ECR Registry URL"
              secret: "${JENKINS_ECR_REGISTRY}"

          # --- EC2 Deployment ---
          - string:
              scope: GLOBAL
              id: "ec2-host"
              description: "EC2 public IP or hostname"
              secret: "${JENKINS_EC2_HOST}"
          - basicSSHUserPrivateKey:
              scope: GLOBAL
              id: "ec2-ssh-key"
              description: "EC2 SSH Key for deployment"
              username: "ubuntu"
              privateKeySource:
                directEntry:
                  privateKey: "${@base64:${JENKINS_EC2_SSH_KEY}}"

          # --- Database ---
          - string:
              scope: GLOBAL
              id: "db-username"
              description: "Database username"
              secret: "${JENKINS_DB_USERNAME}"
          - string:
              scope: GLOBAL
              id: "db-password"
              description: "Database password"
              secret: "${JENKINS_DB_PASSWORD}"
          - string:
              scope: GLOBAL
              id: "db-name"
              description: "Database name"
              secret: "${JENKINS_DB_NAME}"

          # --- SonarCloud ---
          - string:
              scope: GLOBAL
              id: "sonarcloud-token"
              description: "SonarCloud authentication token"
              secret: "${JENKINS_SONAR_TOKEN}"

          # --- Slack ---
          - string:
              scope: GLOBAL
              id: "slack-token"
              description: "Slack Bot OAuth token"
              secret: "${JENKINS_SLACK_TOKEN}"

          # --- CodeDeploy ---
          - string:
              scope: GLOBAL
              id: "codedeploy-app-name"
              description: "CodeDeploy application name"
              secret: "${JENKINS_CODEDEPLOY_APP}"
          - string:
              scope: GLOBAL
              id: "codedeploy-deployment-group"
              description: "CodeDeploy deployment group name"
              secret: "${JENKINS_CODEDEPLOY_DG}"

          # --- ECS ---
          - string:
              scope: GLOBAL
              id: "ecs-alb-dns-name"
              description: "ECS ALB DNS name"
              secret: "${JENKINS_ECS_ALB_DNS}"
          - string:
              scope: GLOBAL
              id: "ecs-cluster-name"
              description: "ECS cluster name"
              secret: "${JENKINS_ECS_CLUSTER}"
          - string:
              scope: GLOBAL
              id: "ecs-service-name"
              description: "ECS service name"
              secret: "${JENKINS_ECS_SERVICE}"
          - string:
              scope: GLOBAL
              id: "ecs-task-execution-role-arn"
              description: "ECS task execution role ARN"
              secret: "${JENKINS_ECS_EXEC_ROLE}"
          - string:
              scope: GLOBAL
              id: "ecs-task-role-arn"
              description: "ECS task role ARN"
              secret: "${JENKINS_ECS_TASK_ROLE}"

          # --- Observability ---
          - string:
              scope: GLOBAL
              id: "otel-exporter-otlp-endpoint"
              description: "OpenTelemetry OTLP endpoint"
              secret: "${JENKINS_OTEL_ENDPOINT}"

# =============================================================================
# SonarCloud Server Configuration
# =============================================================================
# The Jenkinsfile calls: withSonarQubeEnv('SonarCloud') { ... }
# This requires a named SonarQube installation registered in Jenkins.
# We point it at https://sonarcloud.io (NOT a local server).
# =============================================================================
unclassified:
  sonarGlobalConfiguration:
    buildWrapperEnabled: true
    installations:
      - name: "SonarCloud"
        serverUrl: "https://sonarcloud.io"
        credentialsId: "sonarcloud-token"
        triggers:
          skipScmCause: false
          skipUpstreamCause: false
